# ArchUnit global configuration
# Referência: https://www.archunit.org/userguide/html/000_Index.html#_configuration

# Não falhar quando nenhuma classe satisfaz o predicado `that()`.
# Permite adotar as regras gradualmente — módulos ainda em migração DDD
# não quebram a build por ausência dos pacotes esperados.
archRule.failOnEmptyShould=false
